name: release-cogmint

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package linux x64
        run: |
          mkdir -p dist/cogmint-linux-x64
          cp -r .output dist/cogmint-linux-x64/
          cp package.json dist/cogmint-linux-x64/
          tar -czf dist/cogmint-linux-x64.tar.gz -C dist cogmint-linux-x64

      - name: Package windows x64
        run: |
          mkdir -p dist/cogmint-windows-x64
          cp -r .output dist/cogmint-windows-x64/
          cp package.json dist/cogmint-windows-x64/
          cd dist && zip -r cogmint-windows-x64.zip cogmint-windows-x64

      - name: Package macos arm64
        run: |
          mkdir -p dist/cogmint-macos-arm64
          cp -r .output dist/cogmint-macos-arm64/
          cp package.json dist/cogmint-macos-arm64/
          tar -czf dist/cogmint-macos-arm64.tar.gz -C dist cogmint-macos-arm64

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cogmint-linux-x64.tar.gz
            dist/cogmint-windows-x64.zip
            dist/cogmint-macos-arm64.tar.gz
            dist/checksums.txt
