name: Auto-merge Dependabot

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge safe updates
        if: >
          steps.metadata.outputs.update-type != 'version-update:semver-major' ||
          steps.metadata.outputs.dependency-type == 'indirect' ||
          steps.metadata.outputs.package-ecosystem == 'github_actions' ||
          contains(steps.metadata.outputs.dependency-group-name, 'dev-tooling')
        run: gh pr merge --squash --auto "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Flag major production updates for review
        if: >
          steps.metadata.outputs.update-type == 'version-update:semver-major' &&
          steps.metadata.outputs.dependency-type != 'indirect' &&
          steps.metadata.outputs.package-ecosystem != 'github_actions' &&
          !contains(steps.metadata.outputs.dependency-group-name, 'dev-tooling')
        run: gh pr edit --add-label "major-update,needs-review" "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
