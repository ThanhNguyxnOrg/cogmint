name: Bug Report
description: Report a reproducible bug in COGMINT
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please provide enough
        detail for us to reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the bug, in one or two sentences?
      placeholder: e.g. Sidebar collapses unexpectedly when window is resized below 768px
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal sequence to reproduce the issue.
      placeholder: |
        1. Run `bun run dev`
        2. Open `http://localhost:3000`
        3. Resize window to ~600px wide
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: COGMINT version or commit SHA
      placeholder: e.g. v0.1.0 or 8baf406
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime versions
      description: Bun and/or Node.js version
      placeholder: e.g. Bun 1.1.34, Node 20.11.1
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste logs in code blocks. Redact any secrets.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and discussions before filing this report
          required: true
        - label: I will follow the Code of Conduct
          required: true
