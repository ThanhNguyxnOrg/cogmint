version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      nuxt-stack:
        patterns:
          - "nuxt"
          - "@nuxt/*"
      vue-flow:
        patterns:
          - "@vue-flow/*"
      xterm:
        patterns:
          - "@xterm/*"
      claude-sdk:
        patterns:
          - "@anthropic-ai/*"
      dev-tooling:
        dependency-type: development
        patterns:
          - "typescript"
          - "@iconify-json/*"
          - "@types/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Ho_Chi_Minh
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
