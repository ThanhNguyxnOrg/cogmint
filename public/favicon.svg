<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Cobalt to Violet gradient matching the core theme -->
    <linearGradient id="cogGrad" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2F6FFF" />
      <stop offset="100%" stop-color="#7A4DFF" />
    </linearGradient>
    <!-- Fresh Mint Green gradient matching the 'mint' tagline -->
    <linearGradient id="leafGrad" x1="16" y1="8" x2="28" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#05DCA3" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
  </defs>

  <!-- Left Side: Mechanical Gear Cogs -->
  <path d="M 16,4
           A 12,12 0 0,0 16,28
           L 16,24
           A 8,8 0 0,1 16,8
           Z" 
        fill="url(#cogGrad)" />
  
  <!-- Gear Teeth -->
  <rect x="7.5" y="4.5" width="3.5" height="3.5" transform="rotate(-30 7.5 4.5)" fill="url(#cogGrad)" rx="0.75" />
  <rect x="2" y="14" width="4.5" height="4" fill="url(#cogGrad)" rx="0.75" />
  <rect x="5.8" y="24.2" width="3.5" height="3.5" transform="rotate(30 5.8 24.2)" fill="url(#cogGrad)" rx="0.75" />

  <!-- Right Side: Organic Mint Leaf -->
  <path d="M 16,4
           C 24.5,4 28,11.5 28,16
           C 28,23.5 21,28 16,28
           C 16,28 19.5,20 18.5,16
           C 17.5,12 16,4 16,4
           Z" 
        fill="url(#leafGrad)" />

  <!-- Center: Cognitive Node -->
  <circle cx="16" cy="16" r="2.5" fill="#ffffff" opacity="0.95" />
  <line x1="16" y1="16" x2="21" y2="13.5" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="1 1.5" />
</svg>
